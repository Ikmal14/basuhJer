name: washwise
description: Smart clothing care guide from tag scanning
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  hive_flutter: ^1.1.0
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  uuid: ^4.4.0
  go_router: ^13.2.0
  intl: ^0.19.0
  permission_handler: ^11.3.0
  image: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/symbols/
